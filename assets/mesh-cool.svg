<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" preserveAspectRatio="xMidYMid slice">
  
  <defs>
    <filter id="coolBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="80"></feGaussianBlur>
    </filter>
    <radialGradient id="co-cyan"><stop offset="0%" stop-color="#2BD4F4" stop-opacity="0.9"></stop><stop offset="100%" stop-color="#2BD4F4" stop-opacity="0"></stop></radialGradient>
    <radialGradient id="co-cyans"><stop offset="0%" stop-color="#8AE6F7" stop-opacity="0.85"></stop><stop offset="100%" stop-color="#8AE6F7" stop-opacity="0"></stop></radialGradient>
    <radialGradient id="co-soft"><stop offset="0%" stop-color="#5C76FF" stop-opacity="0.7"></stop><stop offset="100%" stop-color="#5C76FF" stop-opacity="0"></stop></radialGradient>
    <radialGradient id="co-cobalt"><stop offset="0%" stop-color="#2547FF" stop-opacity="0.55"></stop><stop offset="100%" stop-color="#2547FF" stop-opacity="0"></stop></radialGradient>
  </defs>
  <rect width="1600" height="480" fill="#FFFFFF"></rect>
  <g filter="url(#coolBlur)">
    <ellipse cx="160" cy="220" rx="320" ry="260" fill="url(#co-cyan)"></ellipse>
    <ellipse cx="460" cy="180" rx="340" ry="240" fill="url(#co-cyans)"></ellipse>
    <ellipse cx="780" cy="260" rx="320" ry="240" fill="url(#co-soft)"></ellipse>
    <ellipse cx="1080" cy="180" rx="340" ry="220" fill="url(#co-cyans)"></ellipse>
    <ellipse cx="1380" cy="240" rx="320" ry="260" fill="url(#co-cobalt)"></ellipse>
  </g>
</svg>